// ── SMALL COMPONENTS ──────────────────────────────────────────────
const Logo = () => <div style={{fontFamily:"Impact,sans-serif",fontSize:26,letterSpacing:"0.05em",color:"#f0f4f8"}}>Smarter<span style={{color:"#00e676"}}>Quit</span></div>;

const Btn = ({children, onClick, variant="primary", style={}, disabled}) => {
  const styles = {
    primary:{background:"#00e676",color:"#000",padding:"16px 24px",fontSize:16,fontWeight:800},
    secondary:{background:"#111820",color:"#f0f4f8",padding:"14px 20px",fontSize:15,fontWeight:600,border:"1px solid rgba(255,255,255,0.07)"},
    ghost:{background:"transparent",color:"#5a7a96",padding:"10px 16px",fontSize:14},
  };
  return <button style={{border:"none",cursor:disabled?"not-allowed":"pointer",borderRadius:12,fontFamily:"inherit",transition:"all 0.15s",opacity:disabled?0.4:1,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,...styles[variant],...style}} onClick={onClick} disabled={disabled}>{children}</button>;
};

const Tag = ({children, color="#00e676"}) => <span style={{display:"inline-block",background:`${color}18`,border:`1px solid ${color}40`,color,padding:"4px 12px",borderRadius:100,fontSize:12,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase"}}>{children}</span>;

const Bar = ({value, max, color="#00e676", h=6}) => <div style={{background:"#0d1117",borderRadius:99,height:h,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(100,(value/max)*100)}%`,background:color,borderRadius:99,transition:"width 0.5s ease"}}/></div>;

// ── INTAKE ────────────────────────────────────────────────────────
function Intake({onDone}) {
  const [step, setStep] = useState(0);
  const [d, setD] = useState({quitType:"",amount:10,years:"",weekly:"",reason:""});
  const set = (k,v) => setD(p=>({...p,[k]:v}));
  const yr = Math.round((parseFloat(d.weekly)||0)*52);
  const ok = [!!d.quitType, d.amount>0, !!d.years, parseFloat(d.weekly)>0, !!d.reason][step];

  const steps = [
    <div key="s0">
      <h2 style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:24,marginBottom:6}}>What are you quitting?</h2>
      <p style={{color:"#5a7a96",marginBottom:24,fontSize:15}}>This program works for both. Select yours.</p>
      {[["🚬","Cigarettes","cigarettes"],["💨","Vaping / E-cigs","vaping"],["🔥","Both","both"]].map(([e,l,v])=>(
        <div key={v} onClick={()=>set("quitType",v)} style={{display:"flex",alignItems:"center",gap:16,padding:"18px 20px",background:d.quitType===v?"rgba(0,230,118,0.1)":"#0d1117",border:`1px solid ${d.quitType===v?"#00e676":"rgba(255,255,255,0.07)"}`,borderRadius:12,marginBottom:10,cursor:"pointer",transition:"all 0.15s"}}>
          <span style={{fontSize:26}}>{e}</span>
          <span style={{fontWeight:600,fontSize:16}}>{l}</span>
          {d.quitType===v && <span style={{marginLeft:"auto",color:"#00e676",fontSize:18}}>✓</span>}
        </div>
      ))}
    </div>,
    <div key="s1">
      <h2 style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:24,marginBottom:6}}>How many per day?</h2>
      <p style={{color:"#5a7a96",marginBottom:28,fontSize:15}}>{d.quitType==="vaping"?"Pods or cartridges used daily.":"Cigarettes smoked on an average day."}</p>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:60,fontWeight:800,color:"#00e676"}}>{d.amount}</div>
        <div style={{color:"#5a7a96",fontSize:13}}>{d.quitType==="vaping"?"pods/day":"cigarettes/day"}</div>
      </div>
      <input type="range" min={1} max={60} value={d.amount} onChange={e=>set("amount",+e.target.value)} style={{width:"100%",accentColor:"#00e676",cursor:"pointer",marginBottom:8}}/>
      <div style={{display:"flex",justifyContent:"space-between",color:"#5a7a96",fontSize:12}}><span>1</span><span>60</span></div>
    </div>,
    <div key="s2">
      <h2 style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:24,marginBottom:6}}>How long have you been smoking or vaping?</h2>
      <p style={{color:"#5a7a96",marginBottom:24,fontSize:15}}>No judgment. Just helps calibrate your program.</p>
      {[["Less than 1 year","lt1"],["1–5 years","1-5"],["5–10 years","5-10"],["10+ years","10+"]].map(([l,v])=>(
        <div key={v} onClick={()=>set("years",v)} style={{padding:"16px 20px",background:d.years===v?"rgba(0,230,118,0.1)":"#0d1117",border:`1px solid ${d.years===v?"#00e676":"rgba(255,255,255,0.07)"}`,borderRadius:12,marginBottom:10,cursor:"pointer",transition:"all 0.15s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:500,fontSize:15}}>{l}</span>
          {d.years===v && <span style={{color:"#00e676"}}>✓</span>}
        </div>
      ))}
    </div>,
    <div key="s3">
      <h2 style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:24,marginBottom:6}}>What do you spend per week?</h2>
      <p style={{color:"#5a7a96",marginBottom:24,fontSize:15}}>On cigarettes, pods, cartridges — everything.</p>
      <div style={{position:"relative",marginBottom:16}}>
        <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",fontSize:22,color:"#5a7a96"}}>$</span>
        <input type="number" value={d.weekly} onChange={e=>set("weekly",e.target.value)} placeholder="0" style={{width:"100%",background:"#0d1117",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,color:"#f0f4f8",padding:"18px 20px 18px 40px",fontSize:26,fontFamily:"inherit",outline:"none",boxSizing:"border-box",fontWeight:800}}/>
      </div>
      {yr>0 && <div style={{background:"rgba(0,230,118,0.08)",border:"1px solid rgba(0,230,118,0.2)",borderRadius:12,padding:"16px 20px",textAlign:"center"}}>
        <div style={{color:"#5a7a96",fontSize:13,marginBottom:4}}>You spend per year</div>
        <div style={{color:"#00e676",fontSize:38,fontWeight:800}}>${yr.toLocaleString()}</div>
        <div style={{color:"#5a7a96",fontSize:13,marginTop:4}}>That's yours once you quit.</div>
      </div>}
    </div>,
    <div key="s4">
      <h2 style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:24,marginBottom:6}}>What's your biggest reason?</h2>
      <p style={{color:"#5a7a96",marginBottom:24,fontSize:15}}>This is your anchor on hard days. Choose the one that hits hardest.</p>
      {[["❤️","My health","health"],["💰","The money","money"],["👨‍👩‍👧","My family","family"],["🏃","Sports & fitness","sports"],["🌱","Just done with it","done"]].map(([e,l,v])=>(
        <div key={v} onClick={()=>set("reason",v)} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 20px",background:d.reason===v?"rgba(0,230,118,0.1)":"#0d1117",border:`1px solid ${d.reason===v?"#00e676":"rgba(255,255,255,0.07)"}`,borderRadius:12,marginBottom:10,cursor:"pointer",transition:"all 0.15s"}}>
          <span style={{fontSize:24}}>{e}</span>
          <span style={{fontWeight:500,fontSize:15}}>{l}</span>
          {d.reason===v && <span style={{marginLeft:"auto",color:"#00e676"}}>✓</span>}
        </div>
      ))}
    </div>,
  ];

  const next = () => {
    if(step<4){setStep(s=>s+1);return;}
    const startDate = new Date().toISOString();
    const intake = {...d, startDate, yearly:yr};
    save("intake", intake);
    save("startDate", startDate);
    save("cravings", []);
    save("tasks", []);
    onDone(intake);
  };

  return (
    <div style={{minHeight:"100vh",background:"#080c10",color:"#f0f4f8",fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <div style={{maxWidth:460,margin:"0 auto",padding:"24px 20px 100px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28}}>
          <Logo/>
          <Tag>{step+1} of 5</Tag>
        </div>
        <Bar value={step+1} max={5} h={8}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8,marginBottom:32}}>
          {["What","Amount","How long","Cost","Why"].map((s,i)=>(
            <span key={i} style={{fontSize:11,color:i<=step?"#00e676":"#2a3f55",fontWeight:i===step?700:400}}>{s}</span>
          ))}
        </div>
        <div style={{minHeight:320}}>{steps[step]}</div>
        <div style={{display:"flex",gap:12,marginTop:28}}>
          {step>0 && <Btn variant="secondary" onClick={()=>setStep(s=>s-1)} style={{flex:1}}>← Back</Btn>}
          <Btn onClick={next} disabled={!ok} style={{flex:2}}>{step===4?"Build My Plan →":"Next →"}</Btn>
        </div>
      </div>
    </div>
  );
}

// ── CRAVING MODAL ─────────────────────────────────────────────────
function CravingModal({onClose, onLog, currentDay}) {
  const [step, setStep] = useState(0);
  const [strength, setStrength] = useState(5);
  const [trigger, setTrigger] = useState("");
  const strengthEmoji = strength<=2?"😌":strength<=4?"😐":strength<=6?"😰":strength<=8?"😤":"😱";
  const strengthLabel = strength<=2?"Very mild":strength<=4?"Noticeable":strength<=6?"Strong":strength<=8?"Very strong":"Overwhelming";

  const doLog = () => {
    onLog({strength, trigger, timestamp:new Date().toISOString(), day:currentDay});
    setStep(2);
  };

  const resp = RESPONSES[trigger];

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(6px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#0d1117",borderRadius:"22px 22px 0 0",width:"100%",maxWidth:460,padding:28,border:"1px solid rgba(255,255,255,0.07)",borderBottom:"none",maxHeight:"88vh",overflowY:"auto"}}>
        
        {step===0 && <>
          <div style={{textAlign:"center",marginBottom:24}}>
            <div style={{fontSize:52,marginBottom:8}}>{strengthEmoji}</div>
            <h3 style={{fontSize:20,fontFamily:"Georgia,serif",fontStyle:"italic",marginBottom:4}}>How strong is this craving?</h3>
            <div style={{color:"#00e676",fontWeight:700}}>{strength}/10 — {strengthLabel}</div>
          </div>
          <input type="range" min={1} max={10} value={strength} onChange={e=>setStrength(+e.target.value)} style={{width:"100%",accentColor:"#00e676",cursor:"pointer",marginBottom:28}}/>
          <Btn onClick={()=>setStep(1)} style={{width:"100%"}}>Next →</Btn>
        </>}

        {step===1 && <>
          <h3 style={{fontSize:20,fontFamily:"Georgia,serif",fontStyle:"italic",marginBottom:4,textAlign:"center"}}>What triggered it?</h3>
          <p style={{color:"#5a7a96",textAlign:"center",fontSize:14,marginBottom:20}}>One tap. That's it.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
            {Object.entries(RESPONSES).map(([k,r])=>(
              <div key={k} onClick={()=>setTrigger(k)} style={{padding:"20px 14px",background:trigger===k?"rgba(0,230,118,0.1)":"#111820",border:`1px solid ${trigger===k?"#00e676":"rgba(255,255,255,0.07)"}`,borderRadius:14,cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
                <div style={{fontSize:28,marginBottom:6}}>{r.emoji}</div>
                <div style={{fontWeight:600,fontSize:14}}>{r.title.replace(" Trigger","")}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:12}}>
            <Btn variant="secondary" onClick={()=>setStep(0)} style={{flex:1}}>←</Btn>
            <Btn onClick={doLog} disabled={!trigger} style={{flex:2}}>Log it →</Btn>
          </div>
        </>}

        {step===2 && resp && <>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:36,marginBottom:8}}>{resp.emoji}</div>
            <Tag color={resp.color}>{resp.title}</Tag>
          </div>
          {resp.steps.map((s,i)=>(
            <div key={i} style={{display:"flex",gap:14,marginBottom:18,alignItems:"flex-start"}}>
              <span style={{fontSize:22,flexShrink:0}}>{s.icon}</span>
              <p style={{color:"#f0f4f8",fontSize:15,lineHeight:1.65,margin:0}}>{s.text}</p>
            </div>
          ))}
          <div style={{background:"#111820",borderRadius:12,padding:"14px 16px",marginBottom:20,borderLeft:`3px solid ${resp.color}`}}>
            <p style={{color:"#5a7a96",fontSize:13,lineHeight:1.65,margin:0,fontStyle:"italic"}}>{resp.reminder}</p>
          </div>
          <Btn onClick={onClose} style={{width:"100%",background:resp.color}}>I got this — craving logged ✓</Btn>
        </>}
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function Dashboard({intake}) {
  const [showCraving, setShowCraving] = useState(false);
  const [expandedDay, setExpandedDay] = useState(false);
  const [cravings, setCravings] = useState(()=>load("cravings",[]));
  const [doneTasks, setDoneTasks] = useState(()=>load("tasks",[]));

  const rawDay = daysSince(intake.startDate)+1;
  const currentDay = Math.min(rawDay, 21);
  const dayData = DAYS[currentDay-1];
  const dailySaved = (parseFloat(intake.weekly)||0)/7;
  const totalSaved = dailySaved * Math.max(0, rawDay-1);
  const todayCravings = cravings.filter(c=>{
    const d=new Date(c.timestamp), t=new Date();
    return d.toDateString()===t.toDateString();
  });
  const totalCravings = cravings.length;
  const taskDone = doneTasks.includes(currentDay);
  const phaseColor = dayData.phaseColor;

  const handleLog = (c) => {
    const updated = [...cravings, c];
    setCravings(updated);
    save("cravings", updated);
  };

  const markTask = () => {
    if(!doneTasks.includes(currentDay)){
      const u=[...doneTasks,currentDay];
      setDoneTasks(u);
      save("tasks",u);
    }
  };

  return (
    <div style={{minHeight:"100vh",background:"#080c10",color:"#f0f4f8",fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <div style={{maxWidth:460,margin:"0 auto",paddingBottom:120}}>

        {/* Header */}
        <div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <Logo/>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:"#5a7a96",letterSpacing:"0.05em",textTransform:"uppercase"}}>Day</div>
            <div style={{fontSize:24,fontWeight:800,color:"#00e676",lineHeight:1}}>{currentDay}<span style={{color:"#5a7a96",fontSize:14}}>/21</span></div>
          </div>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:"rgba(255,255,255,0.07)",margin:"16px 0 0",borderTop:"1px solid rgba(255,255,255,0.07)",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          {[{e:"💰",v:money(totalSaved),l:"Saved",c:"#00e676"},{e:"🚭",v:`${currentDay} days`,l:"Streak",c:"#40c4ff"},{e:"💪",v:`${todayCravings.length} today`,l:"Beaten",c:"#ffd600"}].map((s,i)=>(
            <div key={i} style={{background:"#0d1117",padding:"16px 10px",textAlign:"center"}}>
              <div style={{fontSize:20,marginBottom:2}}>{s.e}</div>
              <div style={{fontSize:14,fontWeight:800,color:s.c}}>{s.v}</div>
              <div style={{fontSize:11,color:"#5a7a96",marginTop:1}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* Progress bar */}
        <div style={{padding:"16px 20px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <Tag color={phaseColor}>{dayData.phase}</Tag>
            <span style={{color:"#5a7a96",fontSize:13}}>{currentDay} of 21 days</span>
          </div>
          <Bar value={currentDay} max={21} color={phaseColor} h={8}/>
        </div>

        {/* Milestone */}
        {dayData.milestone && (
          <div style={{margin:"16px 20px 0",background:"linear-gradient(135deg,rgba(0,230,118,0.1),rgba(0,230,118,0.04))",border:"1px solid rgba(0,230,118,0.25)",borderRadius:16,padding:"20px",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:6}}>{dayData.milestone.emoji}</div>
            <div style={{fontWeight:800,fontSize:18,color:"#00e676"}}>{dayData.milestone.text}</div>
            <div style={{color:"#5a7a96",fontSize:14,marginTop:4}}>{dayData.milestone.sub}</div>
          </div>
        )}

        {/* Awareness notice */}
        {dayData.allowSmoking && (
          <div style={{padding:"16px 20px 0"}}>
            <div style={{background:"rgba(255,214,0,0.07)",border:"1px solid rgba(255,214,0,0.2)",borderRadius:12,padding:"14px 16px",display:"flex",gap:12}}>
              <span style={{fontSize:18,flexShrink:0}}>ℹ️</span>
              <p style={{color:"rgba(255,214,0,0.9)",fontSize:14,lineHeight:1.5,margin:0}}><strong>Today you can still smoke or vape.</strong> This is intentional. Observe your habit. Log every craving whether you act on it or not.</p>
            </div>
          </div>
        )}

        {/* Day card */}
        <div style={{padding:"16px 20px 0"}}>
          <div onClick={()=>setExpandedDay(!expandedDay)} style={{background:"#111820",border:`1px solid ${expandedDay?phaseColor:"rgba(255,255,255,0.07)"}`,borderRadius:16,padding:20,cursor:"pointer",transition:"border-color 0.2s",boxShadow:expandedDay?`0 0 24px ${phaseColor}18`:"none"}}>
            <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
              <span style={{fontSize:32,flexShrink:0}}>{dayData.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:phaseColor,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:4}}>Day {currentDay} — {dayData.phase}</div>
                <h2 style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:19,lineHeight:1.3,marginBottom:4}}>{dayData.title}</h2>
                <p style={{color:"#5a7a96",fontSize:14,margin:0}}>{dayData.subtitle}</p>
              </div>
              <span style={{color:"#5a7a96",fontSize:20,flexShrink:0,transition:"transform 0.2s",transform:expandedDay?"rotate(90deg)":"none"}}>›</span>
            </div>
          </div>
        </div>

        {/* Expanded content */}
        {expandedDay && (
          <div style={{padding:"12px 20px 0"}}>
            {dayData.content.map((b,i)=>{
              if(b.type==="hook") return <div key={i} style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:18,color:"#f0f4f8",lineHeight:1.75,marginBottom:20,borderLeft:`3px solid ${phaseColor}`,paddingLeft:16}}>{b.text}</div>;
              if(b.type==="science") return <div key={i} style={{background:"#111820",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:18,marginBottom:14}}>
                <div style={{fontSize:11,color:"#40c4ff",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>🔬 {b.label}</div>
                <p style={{color:"rgba(240,244,248,0.85)",fontSize:15,lineHeight:1.7,margin:0}}>{b.text}</p>
              </div>;
              if(b.type==="insight") return <div key={i} style={{background:"rgba(0,230,118,0.08)",border:"1px solid rgba(0,230,118,0.2)",borderRadius:12,padding:18,marginBottom:14}}>
                <div style={{fontSize:11,color:"#00e676",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>💡 {b.label}</div>
                <p style={{color:"#f0f4f8",fontSize:15,lineHeight:1.7,margin:0}}>{b.text}</p>
              </div>;
              return <p key={i} style={{color:"rgba(240,244,248,0.8)",fontSize:15,lineHeight:1.75,marginBottom:16}}>{b.text}</p>;
            })}

            {/* Task */}
            <div style={{background:taskDone?"rgba(0,230,118,0.08)":"#111820",border:`1px solid ${taskDone?"#00e676":"rgba(255,255,255,0.07)"}`,borderRadius:14,padding:20,marginBottom:4}}>
              <div style={{fontSize:11,color:taskDone?"#00e676":"#5a7a96",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>{taskDone?"✓ Task complete":"📋 Today's task"}</div>
              <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{dayData.task.emoji} {dayData.task.title}</div>
              <p style={{color:"#5a7a96",fontSize:14,lineHeight:1.65,margin:"0 0 16px"}}>{dayData.task.desc}</p>
              {!taskDone && <Btn onClick={markTask} style={{width:"100%"}}>Mark task as done ✓</Btn>}
            </div>
          </div>
        )}

        {/* Today's cravings */}
        {todayCravings.length>0 && (
          <div style={{padding:"16px 20px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:14,fontWeight:600,color:"#5a7a96"}}>Cravings beaten today</span>
              <Tag color="#ffd600">{todayCravings.length}</Tag>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {todayCravings.map((c,i)=>(
                <div key={i} style={{background:"#111820",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"6px 12px",fontSize:13,color:"#5a7a96",display:"flex",alignItems:"center",gap:6}}>
                  {RESPONSES[c.trigger]?.emoji||"💪"} <span style={{color:"#f0f4f8",fontWeight:600}}>{c.strength}/10</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Upcoming days */}
        {currentDay<21 && (
          <div style={{padding:"20px 20px 0"}}>
            <p style={{fontSize:12,color:"#5a7a96",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Coming up</p>
            <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:8}}>
              {DAYS.slice(currentDay, Math.min(currentDay+4,21)).map(d=>(
                <div key={d.day} style={{background:"#111820",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"14px 16px",flexShrink:0,minWidth:110}}>
                  <div style={{fontSize:20,marginBottom:6}}>{d.emoji}</div>
                  <div style={{fontSize:11,color:"#5a7a96",marginBottom:4}}>Day {d.day}</div>
                  <div style={{fontSize:13,fontWeight:600,lineHeight:1.3}}>{d.title}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Completion */}
        {currentDay>=21 && (
          <div style={{padding:"20px 20px 0"}}>
            <div style={{background:"linear-gradient(135deg,rgba(0,230,118,0.1),rgba(0,230,118,0.04))",border:"1px solid rgba(0,230,118,0.25)",borderRadius:20,padding:28,textAlign:"center"}}>
              <div style={{fontSize:52,marginBottom:12}}>🎉</div>
              <h2 style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:26,marginBottom:10}}>You did it.</h2>
              <p style={{color:"#5a7a96",fontSize:15,marginBottom:20,lineHeight:1.6}}>You are no longer a smoker. You are someone who doesn't smoke. Those are different people.</p>
              <div style={{background:"#0d1117",borderRadius:12,padding:20,marginBottom:8}}>
                <div style={{color:"#5a7a96",fontSize:13,marginBottom:4}}>Total saved</div>
                <div style={{color:"#00e676",fontSize:44,fontWeight:800}}>{money(totalSaved)}</div>
              </div>
              <p style={{color:"#5a7a96",fontSize:13,marginTop:16}}>NOPE — Not One Puff Ever. Keep the door closed. You've earned it.</p>
            </div>
          </div>
        )}

        {/* Motivational quote */}
        <div style={{padding:"16px 20px 0"}}>
          <div style={{borderLeft:"3px solid rgba(255,255,255,0.06)",paddingLeft:16}}>
            <p style={{color:"#2a3f55",fontSize:13,fontStyle:"italic",lineHeight:1.6,margin:0}}>
              {["The craving is loudest right before it stops.","Your only competition is who you were yesterday.","One craving at a time. One day at a time. That's all it takes.","Every time you say 'I don't smoke' you become someone who doesn't smoke.","The habit has to work harder every day you don't feed it."][currentDay%5]}
            </p>
          </div>
        </div>

      </div>

      {/* Craving button */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:460,padding:"12px 20px 28px",background:"linear-gradient(to top, #080c10 75%, transparent)"}}>
        <button onClick={()=>setShowCraving(true)} style={{width:"100%",background:"#00e676",color:"#000",border:"none",borderRadius:14,padding:"18px",fontSize:18,fontWeight:800,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:"0 0 40px rgba(0,230,118,0.25)"}}>
          😤 I'm Craving Right Now
        </button>
      </div>

      {showCraving && <CravingModal onClose={()=>setShowCraving(false)} onLog={handleLog} currentDay={currentDay}/>}
    </div>
  );
}

// ── GATE (payment check) ──────────────────────────────────────────
function Gate({children}) {
  const params = new URLSearchParams(window.location.search);
  const paid = params.get("access")==="granted" || load("paid", false);
  
  useEffect(()=>{
    if(params.get("access")==="granted") save("paid", true);
  },[]);

  if(!paid) {
    return (
      <div style={{minHeight:"100vh",background:"#080c10",color:"#f0f4f8",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',system-ui,sans-serif",padding:20}}>
        <div style={{textAlign:"center",maxWidth:380}}>
          <Logo/>
          <h2 style={{fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:24,margin:"24px 0 12px"}}>Access required</h2>
          <p style={{color:"#5a7a96",marginBottom:28,lineHeight:1.6}}>This is a paid program. Purchase access on our website to begin your 21-day quit journey.</p>
          <a href="/" style={{display:"inline-block",background:"#00e676",color:"#000",padding:"16px 32px",borderRadius:12,fontWeight:800,fontSize:16,textDecoration:"none"}}>Get Access — $7.99</a>
        </div>
      </div>
    );
  }
  return children;
}

// ── ROOT ──────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("loading");
  const [intake, setIntake] = useState(null);

  useEffect(()=>{
    const saved = load("intake", null);
    if(saved && saved.startDate){ setIntake(saved); setScreen("dashboard"); }
    else setScreen("intake");
  },[]);

  if(screen==="loading") return (
    <div style={{minHeight:"100vh",background:"#080c10",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}><Logo/><div style={{color:"#5a7a96",marginTop:12,fontSize:14}}>Loading...</div></div>
    </div>
  );

  return (
    <Gate>
      {screen==="intake" ? <Intake onDone={(d)=>{ setIntake(d); setScreen("dashboard"); }}/> : <Dashboard intake={intake}/>}
    </Gate>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
