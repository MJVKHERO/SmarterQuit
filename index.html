    <!-- Structured Data: Product -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "SmarterQuit 21-Day Quit Program",
      "description": "A science-based 21-day program to quit smoking and vaping. Built around your personal habits, triggers, and reasons. Includes daily content, craving tracker, breathing timer, and live savings counter.",
      "url": "https://smarterquit.com",
      "brand": {
        "@type": "Brand",
        "name": "SmarterQuit"
      },
      "offers": {
        "@type": "Offer",
        "price": "7.99",
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock",
        "url": "https://smarterquit.com",
        "priceValidUntil": "2026-12-31"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "847",
        "bestRating": "5",
        "worstRating": "1"
      },
      "review": [
        {
          "@type": "Review",
          "author": { "@type": "Person", "name": "Ashley M." },
          "reviewRating": { "@type": "Rating", "ratingValue": "5" },
          "reviewBody": "I've tried patches, gum, every app. What made this different was Day 1 — logging every smoke. By evening I couldn't believe how much my habit controlled me. Smoke-free since Day 5."
        },
        {
          "@type": "Review",
          "author": { "@type": "Person", "name": "Marcus R." },
          "reviewRating": { "@type": "Rating", "ratingValue": "5" },
          "reviewBody": "The identity shift on Day 6 changed everything. Stopped saying I'm trying to quit and started saying I don't smoke. Hit Day 21. Haven't touched one since."
        },
        {
          "@type": "Review",
          "author": { "@type": "Person", "name": "Jordan T." },
          "reviewRating": { "@type": "Rating", "ratingValue": "5" },
          "reviewBody": "Was going through 2 pods a day. The savings calculator showed me $180 a month. The 3-minute craving timer actually works. Best $8 I've ever spent."
        }
      ]
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SmarterQuit",
      "url": "https://smarterquit.com",

      }

    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Does SmarterQuit work for vaping?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SmarterQuit is built for both smoking and vaping. Select your type during the intake and the entire program adapts to you."
          }
        },
        {
          "@type": "Question",
          "name": "What is the money-back guarantee?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Complete all 21 days of the program and still smoke or vape? Email hello@smarterquit.com for a full refund within 5 business days. No questions asked."
          }
        },
        {
          "@type": "Question",
          "name": "How does the SmarterQuit program work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SmarterQuit is a 21-day program in 3 phases. Days 1-3 are awareness days where you still smoke but log every craving to understand your triggers. Days 4-10 you stop, supported by a 3-minute craving timer. Days 11-21 build your new identity as someone who doesn't smoke."
          }
        },
        {
          "@type": "Question",
          "name": "How much does SmarterQuit cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SmarterQuit costs $7.99 — less than one pack of cigarettes. This is a launch price. The regular price will be $19.99."
          }
        }
      ]
    }
    </script>
